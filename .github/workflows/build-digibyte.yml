name: Build and Publish DigiByte Add-on

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'digibyte/**'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # เพิ่มสิทธิ์ให้ GitHub Actions สามารถเขียน Package ได้
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert GitHub repository owner to lowercase
        id: lowercase_owner
        run: |
          echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./digibyte
          push: true
          tags: ghcr.io/${{ env.OWNER_LC }}/digibyte-addon-amd64:8.26.2