name: "Shadowsocks Server"
description: "A fast tunnel proxy that helps you bypass strict firewalls."
version: "1.0.1"
slug: "shadowsocks_server"
init: false
arch:
  - amd64
startup: services
boot: auto
ports:
  8388/tcp: 8388
  8388/udp: 8388
image: "ghcr.io/walofz/shadowsocks-addon-amd64"
options:
  password: "your_secure_password"
  method: "aes-256-gcm"
  dns_provider: "system"
schema:
  password: str
  method: list(aes-256-gcm|chacha20-ietf-poly1305|xchacha20-ietf-poly1305)
  dns_provider: list(system|cloudflare|google|quad9)